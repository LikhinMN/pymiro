name: Deploy MkDocs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy MkDocs
        run: |
          uv sync --group docs
          uv run mkdocs gh-deploy --force
